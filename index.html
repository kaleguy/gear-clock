<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gear Clock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    svg {
      filter: drop-shadow(0 0 20px rgba(100, 140, 200, 0.15));
    }
  </style>
</head>
<body>
  <svg id="clock" width="800" height="600" viewBox="0 0 800 600">
    <defs>
      <!-- Metallic gradient for small gear -->
      <radialGradient id="smallGearGrad" cx="50%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#c0c8d8"/>
        <stop offset="40%" stop-color="#8a95a8"/>
        <stop offset="100%" stop-color="#5a6577"/>
      </radialGradient>
      <!-- Metallic gradient for large gear -->
      <radialGradient id="largeGearGrad" cx="50%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#d4b896"/>
        <stop offset="40%" stop-color="#b08d6a"/>
        <stop offset="100%" stop-color="#7a6245"/>
      </radialGradient>
      <!-- Hub gradients -->
      <radialGradient id="hubGrad1" cx="50%" cy="40%" r="50%">
        <stop offset="0%" stop-color="#e0e4ec"/>
        <stop offset="100%" stop-color="#6a7588"/>
      </radialGradient>
      <radialGradient id="hubGrad2" cx="50%" cy="40%" r="50%">
        <stop offset="0%" stop-color="#e8d4bc"/>
        <stop offset="100%" stop-color="#8a7050"/>
      </radialGradient>
    </defs>

    <!-- Large gear (minute) -->
    <g id="largeGear" transform="translate(440, 300)">
      <path id="largeGearPath" fill="url(#largeGearGrad)" stroke="#5a4a32" stroke-width="1.5"/>
      <!-- Spokes -->
      <g id="largeSpokes" stroke="#7a6245" stroke-width="4" fill="none" opacity="0.5"></g>
      <!-- Hub -->
      <circle r="28" fill="url(#hubGrad2)" stroke="#5a4a32" stroke-width="1.5"/>
      <circle r="8" fill="#1a1a2e" stroke="#5a4a32" stroke-width="1"/>
    </g>

    <!-- Small gear (second) -->
    <g id="smallGear" transform="translate(0, 0)">
      <path id="smallGearPath" fill="url(#smallGearGrad)" stroke="#3a4555" stroke-width="1.2"/>
      <!-- Hub -->
      <circle r="12" fill="url(#hubGrad1)" stroke="#3a4555" stroke-width="1.2"/>
      <circle r="4" fill="#1a1a2e" stroke="#3a4555" stroke-width="1"/>
    </g>

    <!-- Labels -->
    <text x="440" y="540" text-anchor="middle" fill="#b08d6a" font-size="14" opacity="0.7">1 rev / minute</text>
    <text id="smallLabel" text-anchor="middle" fill="#8a95a8" font-size="12" opacity="0.7">1 rev / second</text>
  </svg>

  <script>
    // Gear tooth generation using involute-style profile
    function generateGearPath(numTeeth, pitchRadius, toothDepth, pressureAngle) {
      const outerRadius = pitchRadius + toothDepth * 0.5;
      const innerRadius = pitchRadius - toothDepth * 0.6;
      const toothAngle = (2 * Math.PI) / numTeeth;
      const halfTooth = toothAngle * 0.28;
      const tipRelief = toothDepth * 0.08;

      let d = '';
      for (let i = 0; i < numTeeth; i++) {
        const angle = i * toothAngle;

        // Root point (start)
        const r1a = angle - toothAngle * 0.5;
        const r1x = innerRadius * Math.cos(r1a);
        const r1y = innerRadius * Math.sin(r1a);

        // Rising flank base
        const r2a = angle - halfTooth * 1.1;
        const r2x = innerRadius * Math.cos(r2a);
        const r2y = innerRadius * Math.sin(r2a);

        // Tooth tip leading
        const t1a = angle - halfTooth * 0.7;
        const t1x = outerRadius * Math.cos(t1a);
        const t1y = outerRadius * Math.sin(t1a);

        // Tooth tip center-leading
        const tc1a = angle - halfTooth * 0.35;
        const tc1x = (outerRadius - tipRelief) * Math.cos(tc1a);
        const tc1y = (outerRadius - tipRelief) * Math.sin(tc1a);

        // Tooth tip center-trailing
        const tc2a = angle + halfTooth * 0.35;
        const tc2x = (outerRadius - tipRelief) * Math.cos(tc2a);
        const tc2y = (outerRadius - tipRelief) * Math.sin(tc2a);

        // Tooth tip trailing
        const t2a = angle + halfTooth * 0.7;
        const t2x = outerRadius * Math.cos(t2a);
        const t2y = outerRadius * Math.sin(t2a);

        // Falling flank base
        const r3a = angle + halfTooth * 1.1;
        const r3x = innerRadius * Math.cos(r3a);
        const r3y = innerRadius * Math.sin(r3a);

        // Root point (end)
        const r4a = angle + toothAngle * 0.5;
        const r4x = innerRadius * Math.cos(r4a);
        const r4y = innerRadius * Math.sin(r4a);

        if (i === 0) {
          d += `M ${r1x} ${r1y} `;
        }

        // Root arc
        d += `A ${innerRadius} ${innerRadius} 0 0 1 ${r2x} ${r2y} `;
        // Rising flank
        d += `C ${(innerRadius + toothDepth * 0.3) * Math.cos(r2a)} ${(innerRadius + toothDepth * 0.3) * Math.sin(r2a)} `;
        d += `${(outerRadius - toothDepth * 0.2) * Math.cos(t1a)} ${(outerRadius - toothDepth * 0.2) * Math.sin(t1a)} `;
        d += `${t1x} ${t1y} `;
        // Tooth tip
        d += `C ${tc1x} ${tc1y} ${tc2x} ${tc2y} ${t2x} ${t2y} `;
        // Falling flank
        d += `C ${(outerRadius - toothDepth * 0.2) * Math.cos(t2a)} ${(outerRadius - toothDepth * 0.2) * Math.sin(t2a)} `;
        d += `${(innerRadius + toothDepth * 0.3) * Math.cos(r3a)} ${(innerRadius + toothDepth * 0.3) * Math.sin(r3a)} `;
        d += `${r3x} ${r3y} `;
        // Root arc to next tooth
        d += `A ${innerRadius} ${innerRadius} 0 0 1 ${r4x} ${r4y} `;
      }
      d += 'Z';
      return d;
    }

    // Configuration
    const largeTeeth = 60;
    const smallTeeth = 10;
    const module = 3.2; // tooth size
    const largePitchR = (largeTeeth * module) / 2;
    const smallPitchR = (smallTeeth * module) / 2;
    const toothDepth = module * 2.2;

    // Position small gear so pitch circles are tangent
    const largeCx = 440;
    const largeCy = 300;
    const centerDist = largePitchR + smallPitchR;
    // Place small gear to the upper-left
    const meshAngle = -Math.PI * 0.42;
    const smallCx = largeCx + centerDist * Math.cos(meshAngle);
    const smallCy = largeCy + centerDist * Math.sin(meshAngle);

    // Generate gear paths
    document.getElementById('largeGearPath').setAttribute('d', generateGearPath(largeTeeth, largePitchR, toothDepth, 20));
    document.getElementById('smallGearPath').setAttribute('d', generateGearPath(smallTeeth, smallPitchR, toothDepth, 20));

    // Generate spokes for large gear
    const spokesGroup = document.getElementById('largeSpokes');
    for (let i = 0; i < 6; i++) {
      const angle = (i * Math.PI * 2) / 6;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', 30 * Math.cos(angle));
      line.setAttribute('y1', 30 * Math.sin(angle));
      line.setAttribute('x2', (largePitchR - toothDepth) * Math.cos(angle));
      line.setAttribute('y2', (largePitchR - toothDepth) * Math.sin(angle));
      spokesGroup.appendChild(line);
    }
    // Inner ring for large gear
    const innerRing = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    innerRing.setAttribute('r', largePitchR - toothDepth * 1.2);
    innerRing.setAttribute('fill', 'none');
    innerRing.setAttribute('stroke', '#7a6245');
    innerRing.setAttribute('stroke-width', '3');
    innerRing.setAttribute('opacity', '0.4');
    spokesGroup.appendChild(innerRing);

    // Position the small gear group
    const smallGearGroup = document.getElementById('smallGear');
    smallGearGroup.setAttribute('transform', `translate(${smallCx}, ${smallCy})`);

    // Position small label
    document.getElementById('smallLabel').setAttribute('x', smallCx);
    document.getElementById('smallLabel').setAttribute('y', smallCy + smallPitchR + 35);

    // Animation
    // The small gear does 1 rev/sec, large does 1 rev/min.
    // For meshing: when the small gear turns, the large gear turns inversely
    // by the tooth ratio. 60:10 = 6:1, so 1 rev of small = 1/6 rev of large.
    // But we want 60:1 speed ratio. The visual meshing won't be perfect at 60:1
    // with a 6:1 tooth ratio, so we animate them at the desired speeds
    // and offset the tooth phase to look right at the mesh point.
    const smallRPM = 60; // 1 rev/sec
    const largeRPM = 1;  // 1 rev/min

    let startTime = null;

    function animate(timestamp) {
      if (!startTime) startTime = timestamp;
      const elapsed = (timestamp - startTime) / 1000; // seconds

      // Small gear: 1 rev/sec = 360 deg/sec
      const smallAngle = elapsed * 360;

      // Large gear: 1 rev/min = 6 deg/sec, counter-rotate for meshing
      const largeAngle = -elapsed * 6;

      // Apply rotations
      smallGearGroup.setAttribute('transform',
        `translate(${smallCx}, ${smallCy}) rotate(${smallAngle})`);
      document.getElementById('largeGear').setAttribute('transform',
        `translate(${largeCx}, ${largeCy}) rotate(${largeAngle})`);

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
